<script>
    const btn = document.getElementById('generateBtn');
    
    btn.onclick = async () => {
        const prompt = document.getElementById('appPrompt').value;
        if(!prompt) return alert("Décris ton idée !");
        
        btn.innerText = "Aura prépare le lancement...";
        
        try {
            const res = await fetch("https://little-night-eb70.iaautomation23.workers.dev", {
                method: "POST",
                body: JSON.stringify({ prompt })
            });
            
            // On récupère l'objet JSON complet généré par Aura V2
            const data = await res.json(); 

            // 1. Mise à jour de l'iPhone (Code SwiftUI)
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('codeOutput').innerText = data.code;
            
            // 2. Mise à jour du Marketing (Si tu as ajouté les zones de texte)
            // document.getElementById('displayAppName').innerText = data.app_name;
            // document.getElementById('displayDesc').innerText = data.description;
            
            alert("Application '" + data.app_name + "' générée avec succès !");
            
        } catch (e) {
            alert("Erreur Aura : " + e.message);
        } finally {
            btn.innerText = "Lancer le déploiement Aura";
        }
    };
</script>
