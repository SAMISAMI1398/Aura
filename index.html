<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Générateur d'Apps Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-button { background: linear-gradient(90deg, #6366f1, #a855f7); transition: 0.3s; }
        .neon-button:hover { box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); transform: translateY(-2px); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="max-w-3xl w-full text-center space-y-8">
        <h1 class="text-6xl font-black tracking-tighter bg-gradient-to-r from-indigo-500 to-purple-500 bg-clip-text text-transparent italic">AURA</h1>
        <p class="text-gray-400 text-lg">Décrivez votre idée. Recevez votre fichier .ipa.</p>

        <div class="glass p-8 rounded-3xl space-y-4">
            <textarea id="prompt" class="w-full bg-transparent border-none text-xl focus:ring-0 placeholder-gray-600 h-32" placeholder="Ex: Une app de fitness avec un timer néon..."></textarea>
            <button onclick="generateApp()" id="btn" class="neon-button w-full py-4 rounded-2xl font-bold text-lg">Lancer la génération</button>
        </div>

        <div id="status" class="hidden glass p-6 rounded-2xl text-left animate-pulse">
            <p id="status-text" class="text-indigo-400 font-mono text-sm">Initialisation d'Aura Core...</p>
        </div>
    </div>

    <script>
        async function generateApp() {
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('btn');
            const statusDiv = document.getElementById('status');
            const statusText = document.getElementById('status-text');

            if (!prompt) return alert("Décrivez votre application d'abord !");

            btn.disabled = true;
            btn.innerText = "Construction en cours...";
            statusDiv.classList.remove('hidden');

            try {
                statusText.innerText = "> Appel de l'IA Aura Architect...";
                const response = await fetch('https://uracorev2.iaautomation23.workers.dev/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error);

                statusText.innerText = `> Succès : ${data.app_name} est en cours de compilation .ipa sur GitHub !`;
                btn.innerText = "Génération Terminée";
                
            } catch (err) {
                statusText.innerText = "> Erreur : " + err.message;
                btn.disabled = false;
                btn.innerText = "Réessayer";
            }
        }
    </script>
</body>
</html>
