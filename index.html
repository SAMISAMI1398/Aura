<script>
    // On initialise les icônes Lucide
    lucide.createIcons();

    const btn = document.getElementById('generateBtn');
    const input = document.getElementById('appPrompt');

    btn.onclick = async () => {
        const promptValue = input.value;
        if(!promptValue) return alert("Veuillez décrire votre idée d'application.");

        // Effet visuel de chargement sur le bouton
        btn.innerHTML = `<span class="animate-spin mr-2 text-white">◌</span> Aura analyse votre vision...`;
        btn.disabled = true;

        try {
            // APPEL À TON WORKER (Vérifie bien que l'URL est la bonne)
            const response = await fetch("https://little-night-eb70.iaautomation23.workers.dev", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: promptValue })
            });

            if (!response.ok) throw new Error("Erreur serveur");

            const data = await response.json();

            // 1. Affichage du Marketing
            const marketingZone = document.getElementById('marketingZone');
            if (marketingZone) {
                marketingZone.classList.remove('hidden');
                document.getElementById('displayAppName').innerText = data.app_name;
                document.getElementById('displayDesc').innerText = data.description;
            }

            // 2. Affichage du Code Technique
            const resultZone = document.getElementById('result');
            if (resultZone) {
                resultZone.classList.remove('hidden');
                document.getElementById('codeOutput').innerText = data.code;
            }

            // 3. Mise à jour de l'iPhone (Placeholder)
            const placeholder = document.getElementById('placeholderUI');
            if (placeholder) {
                placeholder.innerHTML = `
                    <div class="animate-bounce mb-4 text-green-500">
                        <i data-lucide="check-circle" class="w-12 h-12 mx-auto"></i>
                    </div>
                    <p class="text-white font-bold text-lg">${data.app_name}</p>
                    <p class="text-zinc-500 text-[10px] mt-2 uppercase tracking-widest">Prototype Déployé</p>
                `;
            }

            lucide.createIcons(); // On rafraîchit les icônes générées

        } catch (error) {
            console.error(error);
            alert("Connexion impossible au cerveau Aura. Vérifiez votre Worker.");
        } finally {
            btn.innerHTML = `<i data-lucide="sparkles" class="w-5 h-5"></i> Générer le Prototype Pro`;
            btn.disabled = false;
        }
    };
</script>
