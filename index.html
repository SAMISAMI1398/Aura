<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura - AI App Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white font-sans min-h-screen flex flex-col">
    <nav class="p-6 border-b border-gray-800 flex justify-between items-center">
        <div class="flex items-center gap-2 text-blue-500 font-bold text-2xl">
            <i data-lucide="sparkles"></i> Aura
        </div>
    </nav>

    <main class="flex-1 p-10 grid grid-cols-1 md:grid-cols-2 gap-10">
        <div class="space-y-6">
            <div class="bg-zinc-900 p-6 rounded-2xl border border-gray-800">
                <label class="block text-sm font-medium mb-4">Votre idée d'application</label>
                <textarea id="appPrompt" class="w-full h-40 bg-black border border-gray-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ex: Une app de fitness..."></textarea>
                <button id="generateBtn" class="w-full mt-4 bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition">Générer l'Application</button>
            </div>
        </div>

        <div class="flex justify-center items-center bg-zinc-900/50 rounded-3xl border border-dashed border-gray-800">
            <div class="relative w-72 h-[580px] bg-black border-[8px] border-zinc-800 rounded-[3rem] shadow-2xl overflow-hidden">
                <iframe id="preview" src="about:blank" class="w-full h-full border-none"></iframe>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const generateBtn = document.getElementById('generateBtn');
        const appPrompt = document.getElementById('appPrompt');
        const previewFrame = document.getElementById('preview');

        generateBtn.addEventListener('click', async () => {
            const promptValue = appPrompt.value;
            if (!promptValue) return alert("Décris ton app !");
            
            generateBtn.innerText = "Génération...";
            generateBtn.disabled = true;

            try {
                const response = await fetch("https://little-night-eb70.iaautomation23.workers.dev", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: promptValue })
                });
                const data = await response.json();
                previewFrame.srcdoc = `<div style="color:#7dd3fc; padding:20px; font-family:monospace;">${data.code}</div>`;
            } catch (e) {
                alert("Erreur de connexion au Worker");
            } finally {
                generateBtn.innerText = "Générer l'Application";
                generateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
