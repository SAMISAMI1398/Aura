<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Pro | L'IA qui déploie vos rêves</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: radial-gradient(circle at top right, #1e1b4b, #000000); margin: 0; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .iphone-shadow { box-shadow: 0 0 80px rgba(96, 165, 250, 0.15); }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .animate-float { animation: float 5s ease-in-out infinite; }
    </style>
</head>
<body class="text-white flex flex-col items-center p-6 overflow-x-hidden">

    <nav class="w-full max-w-6xl flex justify-between items-center mb-12">
        <div class="text-2xl font-black tracking-tighter flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center italic text-white">A</div>
            AURA <span class="text-zinc-500 font-light text-sm ml-2 tracking-widest uppercase">Studio Pro</span>
        </div>
        <div class="glass px-4 py-2 rounded-full text-[10px] font-bold text-zinc-400 border border-white/5 uppercase tracking-widest">
            Credits: $5.00 Ready
        </div>
    </nav>

    <main class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="space-y-2">
                <h1 class="text-5xl font-bold leading-[1.1]">Créez l'app de <br><span class="gradient-text italic">vos rêves.</span></h1>
                <p class="text-zinc-500 text-sm font-medium">L'IA de déploiement autonome qui transforme vos idées en produits finis.</p>
            </div>

            <div class="glass p-4 rounded-3xl border border-white/10 shadow-2xl">
                <textarea id="appPrompt" class="w-full h-32 bg-transparent p-4 text-sm outline-none resize-none placeholder:text-zinc-700" placeholder="Décrivez votre vision..."></textarea>
                <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-900/40 uppercase text-xs tracking-widest">
                    <i data-lucide="zap" class="w-4 h-4"></i> Lancer la génération
                </button>
            </div>

            <div id="marketingZone" class="glass p-6 rounded-3xl hidden border border-blue-500/20 shadow-blue-500/5 shadow-2xl">
                <h4 class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                    <i data-lucide="layout"></i> App Store Package
                </h4>
                <div id="displayAppName" class="text-xl font-bold mb-3"></div>
                <div id="displayDesc" class="text-[11px] text-zinc-400 leading-relaxed h-32 overflow-y-auto pr-2 custom-scrollbar italic font-medium"></div>
            </div>
        </div>

        <div class="lg:col-span-4 flex justify-center py-10">
            <div class="relative w-[300px] h-[600px] bg-[#050505] border-[12px] border-zinc-900 rounded-[55px] iphone-shadow animate-float overflow-hidden shadow-2xl border-solid">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-7 bg-black rounded-b-2xl z-20"></div>
                <div id="swiftui-runtime-container" class="w-full h-full bg-black flex flex-col items-center justify-center p-8 text-center">
                    <div id="placeholderUI" class="space-y-6">
                        <div class="w-16 h-16 bg-zinc-900/50 rounded-2xl flex items-center justify-center mx-auto border border-white/5">
                            <i data-lucide="cpu" class="w-8 h-8 text-zinc-700"></i>
                        </div>
                        <p class="text-[10px] text-zinc-600 font-black uppercase tracking-[0.3em] leading-relaxed">System Standby<br>Awaiting Input</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4">
            <div id="result" class="glass p-6 rounded-[32px] hidden h-[500px] flex flex-col border
