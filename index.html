<script>
    lucide.createIcons();

    const generateBtn = document.getElementById('generateBtn');
    const appPrompt = document.getElementById('appPrompt');
    const previewFrame = document.getElementById('preview');

    generateBtn.addEventListener('click', async () => {
        const promptValue = appPrompt.value;
        if (!promptValue) return alert("Décris ton app d'abord !");

        // État de chargement
        generateBtn.innerText = "Aura génère votre code...";
        generateBtn.disabled = true;

        try {
            // APPEL RÉEL À TON WORKER
            const response = await fetch("https://little-night-eb70.iaautomation23.workers.dev", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: promptValue })
            });

            const data = await response.json();
            
            if (data.code) {
                // On affiche le code Swift dans la zone de preview
                previewFrame.srcdoc = `
                    <div style="background:#18181b; color:#7dd3fc; padding:20px; font-family:monospace; height:100vh; overflow:auto;">
                        <h3 style="color:white; border-bottom:1px solid #3f3f46; padding-bottom:10px;">Code SwiftUI Généré :</h3>
                        <pre>${data.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</pre>
                    </div>`;
                alert("Application générée avec succès !");
            }

        } catch (error) {
            console.error(error);
            alert("Erreur de connexion avec le moteur Aura.");
        } finally {
            generateBtn.innerText = "Générer l'Application";
            generateBtn.disabled = false;
        }
    });
</script>
