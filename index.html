<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Aura AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10">
    <div class="max-w-xl mx-auto text-center">
        <h1 class="text-4xl font-bold text-blue-500 mb-8">Aura Engine</h1>
        <textarea id="appPrompt" class="w-full h-32 bg-zinc-900 rounded-xl p-4 mb-4 border border-zinc-700" placeholder="Décris ton application..."></textarea>
        <button id="generateBtn" class="w-full bg-white text-black font-bold py-3 rounded-xl">Générer le Code Swift</button>
        <div id="result" class="mt-8 p-4 bg-zinc-800 rounded text-left hidden">
            <pre id="codeOutput" class="text-xs text-blue-300"></pre>
        </div>
    </div>

    <script>
        const btn = document.getElementById('generateBtn');
        btn.onclick = async () => {
            const prompt = document.getElementById('appPrompt').value;
            if(!prompt) return alert("Vide !");
            btn.innerText = "Calcul...";
            try {
                const res = await fetch("https://little-night-eb70.iaautomation23.workers.dev", {
                    method: "POST",
                    body: JSON.stringify({ prompt })
                });
                const data = await res.json();
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('codeOutput').innerText = data.code;
            } catch (e) { alert("Erreur Worker"); }
            btn.innerText = "Générer le Code Swift";
        };
    </script>
</body>
</html>
