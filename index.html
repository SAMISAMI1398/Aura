<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftGenius - App Launchpad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white font-sans min-h-screen flex">

    <nav class="w-64 border-r border-gray-800 p-6 flex flex-col gap-8">
        <div class="flex items-center gap-2 text-blue-500 font-bold text-xl">
            <i data-lucide="rocket"></i> Launchpad
        </div>
        <div class="flex flex-col gap-4">
            <button class="flex items-center gap-3 p-3 bg-blue-600 rounded-lg text-sm font-medium">
                <i data-lucide="layout"></i> Studio Design
            </button>
            <button class="flex items-center gap-3 p-3 hover:bg-gray-900 rounded-lg text-sm text-gray-400">
                <i data-lucide="smartphone"></i> Live Preview
            </button>
            <button class="flex items-center gap-3 p-3 hover:bg-gray-900 rounded-lg text-sm text-gray-400">
                <i data-lucide="image"></i> Screenshots IA
            </button>
            <button class="flex items-center gap-3 p-3 hover:bg-gray-900 rounded-lg text-sm text-gray-400 border border-dashed border-gray-700 mt-4">
                <i data-lucide="upload-cloud"></i> App Store Connect
            </button>
        </div>
    </nav>

    <main class="flex-1 p-10">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold">Studio Design</h1>
                <p class="text-gray-500">Décrivez votre application pour générer le code Swift.</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs bg-green-500/20 text-green-500 px-3 py-1 rounded-full border border-green-500/50">Système Prêt</span>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-10">
            <div class="space-y-6">
                <div class="bg-zinc-900 p-6 rounded-2xl border border-gray-800">
                    <label class="block text-sm font-medium mb-4">Votre idée d'application</label>
                    <textarea id="appPrompt" class="w-full h-40 bg-black border border-gray-800 rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ex: Une app de gestion de budget en mode sombre avec des graphiques..."></textarea>
                    <button id="generateBtn" class="w-full mt-4 bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition">Générer l'Application</button>
                </div>
                
                <div class="bg-zinc-900 p-6 rounded-2xl border border-gray-800">
                    <h3 class="font-semibold mb-4 text-sm">Status du Déploiement</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between text-xs text-gray-400 italic">
                            <span>Génération Code...</span>
                            <span class="text-blue-500">OK</span>
                        </div>
                        <div class="w-full bg-gray-800 h-1 rounded-full overflow-hidden">
                            <div class="bg-blue-600 w-1/3 h-full"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-center items-center bg-zinc-900/50 rounded-3xl border border-dashed border-gray-800">
                <div class="relative w-72 h-[580px] bg-black border-[8px] border-zinc-800 rounded-[3rem] shadow-2xl overflow-hidden">
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-zinc-800 rounded-b-2xl z-20"></div>
                    <iframe id="preview" src="about:blank" class="w-full h-full border-none"></iframe>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        // Le script pour appeler ton API IA directement viendra ici
    </script>
</body>
</html>
