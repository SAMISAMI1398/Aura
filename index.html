<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura - Interactive Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/gh/mo-app/swiftui-web@main/dist/swiftui-web.js"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col font-sans">

    <nav class="p-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-950">
        <div class="flex items-center gap-2 text-blue-500 font-bold text-2xl">
            <i data-lucide="sparkles"></i> Aura PRO
        </div>
        <button class="bg-blue-600 text-sm px-4 py-2 rounded-full font-medium">Partager</button>
    </nav>

    <main class="flex-1 p-8 grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <div class="space-y-6">
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 space-y-4">
                <label class="block text-sm font-medium text-zinc-400">Décris ton application interactive</label>
                <textarea id="appPrompt" class="w-full h-32 bg-black border border-zinc-700 rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ex: Une app avec un compteur et deux boutons + et -"></textarea>
                <button id="generateBtn" class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-zinc-200 transition duration-150 flex items-center justify-center gap-2">
                    <i data-lucide="zap" class="w-5 h-5"></i> Générer & Rendre Interactive
                </button>
            </div>
            
            <details class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 text-xs text-zinc-500">
                <summary class="cursor-pointer font-medium text-zinc-400">Voir le code SwiftUI généré</summary>
                <pre id="codeOutput" class="mt-4 p-4 bg-black rounded-lg overflow-x-auto text-blue-300"></pre>
            </details>
        </div>

        <div class="flex flex-col items-center justify-center bg-zinc-900/50 rounded-3xl border border-dashed border-zinc-800 p-6">
            <h2 class="text-sm font-medium text-zinc-500 mb-6">Aperçu Interactif en Temps Réel</h2>
            
            <div class="relative w-[300px] h-[600px] bg-black border-[14px] border-zinc-800 rounded-[54px] shadow-2xl overflow-hidden frame-border">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-7 bg-black rounded-b-2xl z-20"></div>
                
                <div id="swiftui-runtime-container" class="w-full h-full bg-white text-black">
                    </div>
            </div>
        </div>
    </main>

    <script>
        // Initialisation des icônes
        lucide.createIcons();

        const generateBtn = document.getElementById('generateBtn');
        const appPrompt = document.getElementById('appPrompt');
        const codeOutput = document.getElementById('codeOutput');
        const runtimeContainer = document.getElementById('swiftui-runtime-container');

        generateBtn.addEventListener('click', async () => {
            const promptValue = appPrompt.value;
            if (!promptValue) return alert("Décris d'abord ton app !");

            // État de chargement
            generateBtn.innerHTML = '<i data-lucide="loader-circle" class="w-5 h-5 animate-spin"></i> Aura réfléchit...';
            generateBtn.disabled = true;
            runtimeContainer.innerHTML = '<div class="flex h-full items-center justify-center text-zinc-400 text-sm">Chargement du moteur...</div>';

            try {
                // APPEL À TON WORKER CLOUDFLARE (Relie bien ton URL !)
                const response = await fetch("https://little-night-eb70.iaautomation23.workers.dev", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: promptValue + " Réponds UNIQUEMENT avec le code SwiftUI complet, sans explications." }) // On force le format
                });

                const data = await response.json();
                
                if (data.code) {
                    // 1. Afficher le code brut (pour vérification)
                    codeOutput.innerText = data.code;

                    // 2. MAGIE : Compiler et rendre l'app interactive
                    runtimeContainer.innerHTML = ''; // On vide le chargement
                    
                    // Cette fonction vient de la bibliothèque chargée dans le <head>
                    SwiftUI.render(data.code, runtimeContainer);
                    
                    console.log("App SwiftUI rendue interactive !");
                }
            } catch (error) {
                console.error(error);
                runtimeContainer.innerHTML = '<div class="flex h-full items-center justify-center text-red-500 p-4 text-center text-xs">Erreur de rendu. Le code généré est peut-être incompatible avec le moteur web.</div>';
            } finally {
                generateBtn.innerHTML = '<i data-lucide="zap" class="w-5 h-5"></i> Générer & Rendre Interactive';
                generateBtn.disabled = false;
                lucide.createIcons(); // On rafraîchit les icônes
            }
        });
    </script>

    <style>
        /* Petit style pour simuler les bords incurvés de l'écran iPhone */
        .frame-border {
            box-shadow: 0 0 0 2px #3f3f46, 0 20px 50px rgba(0,0,0,0.5);
        }
    </style>
</body>
</html>
